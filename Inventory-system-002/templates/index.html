<!DOCTYPE html>
<html>
<head>
    <title>Supermarket Inventory</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Supermarket Inventory System</h1>
    <input type="text" id="search" placeholder="Search items...">
    <table id="inventory-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for item in inventory %}
            <tr>
                <td>{{ item.name }}</td>
                <td>{{ item.category }}</td>
                <td>{{ item.quantity }}</td>
                <td>${{ "%.2f"|format(item.price) }}</td>
                <td>{{ item.description }}</td>
                <td>
                    <form method="post" action="/sell/{{ item.id }}" style="display:inline;">
                        <input type="number" name="quantity" value="1" min="1" max="{{ item.quantity }}" style="width:50px;">
                        <button type="submit" class="sell-btn">Sell</button>
                    </form>
                    <a href="/edit/{{ item.id }}">Edit</a> |
                    <a href="/delete/{{ item.id }}" onclick="return confirm('Delete this item?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <h2>Add New Item</h2>
    <form action="/add" method="post">
        <input type="text" name="name" placeholder="Item name" required>
        <input type="text" name="category" placeholder="Category" required>
        <input type="number" name="quantity" placeholder="Quantity" required>
        <input type="number" step="0.01" name="price" placeholder="Price" required>
        <textarea name="description" placeholder="Description"></textarea>
        <button type="submit">Add Item</button>
    </form>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
