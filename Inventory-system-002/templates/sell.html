<!DOCTYPE html>
<html>
<head>
    <title>Sell Item</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Sell Item: {{ item.name }}</h1>
    <p>Current Quantity: {{ item.quantity }}</p>
    <form action="/sell/{{ item.id }}" method="post">
        <label for="quantity">Quantity to Sell:</label>
        <input type="number" id="quantity" name="quantity" value="1" min="1" max="{{ item.quantity }}" required>
        <button type="submit">Sell Item</button>
    </form>
    <a href="/">Back to Inventory</a>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
